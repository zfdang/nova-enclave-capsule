name: CI

on:
  push:
    branches:
      - sparsity
  pull_request:
    branches:
      - sparsity

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse MSRV
        run: sed -n 's/^rust-version = "\(.*\)"$/RUSTUP_TOOLCHAIN=\1/p' enclaver/Cargo.toml >> $GITHUB_ENV

      - name: Install Rust Toolchain
        run: rustup toolchain install $RUSTUP_TOOLCHAIN

      - name: Install Rustfmt
        run: rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --manifest-path enclaver/Cargo.toml --all -- --check

  clippy-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: default
            features: ""
            rustflags: "-Dwarnings"
          - id: run-enclave-odyn
            features: "run_enclave,odyn"
            rustflags: "-Dwarnings"
          - id: run-enclave-odyn-tracing
            features: "run_enclave,odyn,tracing"
            rustflags: "--cfg=tokio_unstable -Dwarnings"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse MSRV
        run: sed -n 's/^rust-version = "\(.*\)"$/RUSTUP_TOOLCHAIN=\1/p' enclaver/Cargo.toml >> $GITHUB_ENV

      - name: Install Rust Toolchain
        run: rustup toolchain install $RUSTUP_TOOLCHAIN

      - name: Install Clippy
        run: rustup component add clippy

      - name: Cache Cargo registry and git data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: ${{ runner.os }}-cargo-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('enclaver/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUSTUP_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: enclaver/target
          key: ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-clippy-${{ matrix.id }}-${{ hashFiles('enclaver/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-clippy-${{ matrix.id }}-
            ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-

      - name: Check with clippy (${{ matrix.id }})
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [[ -z "${{ matrix.features }}" ]]; then
            cargo clippy --quiet --no-deps --manifest-path enclaver/Cargo.toml
          else
            cargo clippy --quiet --no-deps --manifest-path enclaver/Cargo.toml --features="${{ matrix.features }}"
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: default
            features: ""
          - id: run-enclave
            features: "run_enclave"
          - id: odyn
            features: "odyn"
          - id: run-enclave-odyn
            features: "run_enclave,odyn"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse MSRV
        run: sed -n 's/^rust-version = "\(.*\)"$/RUSTUP_TOOLCHAIN=\1/p' enclaver/Cargo.toml >> $GITHUB_ENV

      - name: Install Rust Toolchain
        run: rustup toolchain install $RUSTUP_TOOLCHAIN

      - name: Cache Cargo registry and git data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: ${{ runner.os }}-cargo-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('enclaver/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUSTUP_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: enclaver/target
          key: ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-test-${{ matrix.id }}-${{ hashFiles('enclaver/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-test-${{ matrix.id }}-
            ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-test-
            ${{ runner.os }}-target-${{ env.RUSTUP_TOOLCHAIN }}-

      - name: Run tests (${{ matrix.id }})
        run: |
          if [[ -z "${{ matrix.features }}" ]]; then
            cargo test --quiet --manifest-path enclaver/Cargo.toml
          else
            cargo test --quiet --manifest-path enclaver/Cargo.toml --features="${{ matrix.features }}"
          fi
