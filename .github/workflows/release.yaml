name: Build Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_images:
        description: 'Set to "true" to run the publish-images job when manually triggered'
        required: false
        default: 'false'
      upload_artifacts:
        description: 'Set to "true" to run the upload-release-artifact job when manually triggered'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-binaries:
    strategy:
      matrix:
        include:
          - target: 'x86_64-unknown-linux-musl'
            host: 'ubuntu-latest'
            uses_musl: true
            extra_cargo_args: '--features=run_enclave,capsule_runtime'

    runs-on: ${{ matrix.host }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache release target directory
        uses: actions/cache@v5
        with:
          path: capsule-cli/target
          key: ${{ runner.os }}-release-target-${{ matrix.target }}-${{ hashFiles('capsule-cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-target-${{ matrix.target }}-
            ${{ runner.os }}-release-target-

      - name: Build Release Binaries (native cargo)
        if: ${{ !matrix.uses_musl }}
        env:
          CAPSULE_CLI_GIT_REVISION: ${{ github.sha }}
        run: |
          cargo build \
          --target ${{ matrix.target }} \
          --manifest-path capsule-cli/Cargo.toml \
          --release \
          ${{ matrix.extra_cargo_args }}

      - name: Build Release Binaries (cargo-zigbuild)
        if: ${{ matrix.uses_musl }}
        uses: ./.github/actions/cargo-zigbuild
        env:
          CAPSULE_CLI_GIT_REVISION: ${{ github.sha }}
        with:
          args: |
            --target ${{ matrix.target }}
            --manifest-path capsule-cli/Cargo.toml
            --release
            ${{ matrix.extra_cargo_args }}

      - name: Generate a SLSA provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "capsule-cli/target/*/release/capsule-cli"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            capsule-cli/target/${{ matrix.target }}/release/capsule-cli
            capsule-cli/target/${{ matrix.target }}/release/capsule-shell
            capsule-cli/target/${{ matrix.target }}/release/capsule-runtime


  publish-images:
    if: >
      github.event_name == 'release'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_images == 'true')
    needs: build-release-binaries
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'
      attestations: 'write'

    env:
      CAPSULE_RUNTIME_IMAGE: public.ecr.aws/d4t4u8d2/sparsity-ai/capsule-runtime
      CAPSULE_SHELL_IMAGE: public.ecr.aws/d4t4u8d2/sparsity-ai/capsule-shell

    steps:
      - name: Download Binaries
        uses: actions/download-artifact@v4

      # Putting the binaries into a path whose name exactly matches Docker's
      # architecture naming conventions makes it easy for the Dockerfiles to
      # COPY architecture-specific files into the image in a nice, cacheable
      # way.
      - name: Re-Arrange Binaries
        shell: bash
        run: |
          mv x86_64-unknown-linux-musl amd64
          chmod 755 amd64/capsule-runtime amd64/capsule-shell

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::004118891089:role/Github-Workflow-Publish-AWS-ECR

      - name: Login to Amazon ECR Public
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registry-type: public

      - name: Generate Capsule Runtime Image Metadata
        id: capsule-runtime-metadata
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.CAPSULE_RUNTIME_IMAGE }}
          tags: |
            type=sha,
            type=semver,pattern=v{{major}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern=v{{major}}.{{minor}}.{{patch}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build Capsule Runtime Image
        id: capsule-runtime-build-image
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:dockerfiles"
          build-contexts: artifacts=.
          file: capsule-runtime-release.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.capsule-runtime-metadata.outputs.tags }}

      - name: Generate SLSA provenance for Capsule Runtime
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.CAPSULE_RUNTIME_IMAGE }}
          subject-digest: ${{ steps.capsule-runtime-build-image.outputs.digest }}
          push-to-registry: true

      - name: Generate Capsule Shell Image Metadata
        id: capsule-shell-metadata
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.CAPSULE_SHELL_IMAGE }}
          tags: |
            type=sha,
            type=semver,pattern=v{{major}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern=v{{major}}.{{minor}}.{{patch}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build Capsule Shell Image
        id: capsule-shell-build-image
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:dockerfiles"
          build-contexts: artifacts=.
          file: capsule-shell-release.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.capsule-shell-metadata.outputs.tags }}

      - name: Generate SLSA provenance for Capsule Shell
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.CAPSULE_SHELL_IMAGE }}
          subject-digest: ${{ steps.capsule-shell-build-image.outputs.digest }}
          push-to-registry: true

  upload-release-artifact:
    if: >
      github.event_name == 'release'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifacts == 'true')
    needs: build-release-binaries
    runs-on: ubuntu-latest

    permissions:
      contents: 'write'

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

    strategy:
      matrix:
        include:
          - target: 'x86_64-unknown-linux-musl'
            release_name: 'capsule-cli-linux-x86_64'
            delay: 60

    steps:
      - name: Download Binaries
        uses: actions/download-artifact@v4

      - name: Construct Release Artifact
        shell: bash
        run: |
          echo Delaying for ${{ matrix.delay }} secs
          sleep ${{ matrix.delay }}
          echo Proceeding

          release_dir="${{ matrix.release_name }}-${RELEASE_TAG}"

          mkdir ${release_dir}
          mv ${{ matrix.target }}/capsule-cli ${release_dir}/capsule-cli
          chmod 755 ${release_dir}/capsule-cli
          tar -czf ${release_dir}.tar.gz ${release_dir}
          sha256sum ${release_dir}.tar.gz > ${release_dir}.tar.gz.sha256

      - name: Upload Artifact to GH Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ matrix.release_name }}-${{ env.RELEASE_TAG }}.tar.gz
            ${{ matrix.release_name }}-${{ env.RELEASE_TAG }}.tar.gz.sha256
