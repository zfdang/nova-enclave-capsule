version: v1
name: "hn-fetcher"
target: "hn-fetcher-enclave:latest"
sources:
  app: "hn-fetcher:latest"
  #capsule-runtime: "capsule-runtime:latest"
  #capsule-shell: "capsule-shell:latest"
defaults:
  memory_mb: 1500
ingress:
  - listen_port: 8000
  - listen_port: 9001
egress:
  allow:
    - news.ycombinator.com
api:
  listen_port: 9000
aux_api:
  listen_port: 9001

