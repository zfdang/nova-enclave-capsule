<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Capsule developer documentation redirect">
    <title>Redirecting to Capsule Developer Documentation</title>
    <link rel="canonical" href="./index.html">
    <meta name="robots" content="noindex">
    <script>
        const target = `index.html${window.location.search}${window.location.hash}`;
        window.location.replace(target);
    </script>
</head>
<body>
    <p>Redirecting to <a href="index.html">Capsule Developer Documentation</a>...</p>
</body>
</html>
