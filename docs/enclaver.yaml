# Enclaver manifest — complete reference (v1)
#
# This file lists all supported configuration fields and documents ingress/egress rules.
# Copy, trim, and edit for your own service. Lines starting with `#` are comments.
#
# Contract
# - Inputs: Docker images, optional signing keys.
# - Outputs: A release image that contains an EIF and the manifest; at runtime `odyn` reads this.
# - Errors: Unknown fields are rejected; missing required fields or malformed values fail at build/run.
#
# Notes
# - If `ingress` is omitted, there is no inbound connectivity into the enclave.
# - If `egress.allow` is empty or omitted, egress is entirely disabled and no proxy env vars are set.
# - If you use S3 or other AWS SDK flows that rely on IMDS, ensure egress allows 169.254.169.254.
# - Domain allow/deny rules support `*` (single label) and `**` (any suffix). See examples below.
# - IP allow/deny rules support exact IP and CIDR (IPv4/IPv6).
#
# ============================================================================
# Parameter Usage Legend:
#   [BUILD]   - Used by `enclaver build` CLI (build-time only)
#   [SLEEVE]  - Used by `enclaver-run` / Sleeve program (host-side runtime)
#   [ODYN]    - Used by Odyn supervisor (enclave-side runtime)
# ============================================================================

# Required top-level fields
version: "v1"                 # [BUILD] Schema version (string). Only "v1" is supported.
name: "your-service"          # [BUILD] Friendly name for your enclave/application (string).
target: "repo/name:tag"       # [BUILD] Release image tag to produce on build (string).

# Source images used during build
sources:
  app: "repo/app:tag"         # [BUILD] REQUIRED. The application image to run inside the enclave.
  # odyn and sleeve may be overridden. If omitted, well-known defaults are pulled.
  # Default odyn:   public.ecr.aws/d4t4u8d2/sparsity-ai/odyn:latest (currently linux/amd64 only)
  # Default sleeve: public.ecr.aws/d4t4u8d2/sparsity-ai/sleeve:latest (currently linux/amd64 only)
  #odyn: "repo/odyn:tag"      # [BUILD] Odyn supervisor image (binary is extracted and added to EIF).
  #sleeve: "repo/sleeve:tag"  # [BUILD] Sleeve base image (used as base for release image).

# Optional: sign the EIF at build time (keys are read on the host during build).
# This only affects `enclaver build`; it is not used by `enclaver run` or by Odyn at runtime.
signature:
  # Paths are resolved relative to the manifest file location.
  certificate: ./path/to/cert.pem   # [BUILD] Required. Path to X.509 certificate in PEM format
  key: ./path/to/key.pem            # [BUILD] Required. Path to private key in PEM format

# Optional defaults used by `enclaver run` when flags are not provided
# If omitted, the runtime defaults are cpu_count=2, memory_mb=4096
defaults:
  cpu_count: 2               # [SLEEVE] Optional. Number of vCPUs (i32) to assign to the enclave
  memory_mb: 4096            # [SLEEVE] Optional. Enclave memory in MiB (i32)

# Ingress: host->enclave TCP listeners exposed by odyn inside the enclave
# Each entry binds inside the enclave on the given listen_port and is proxied via host localhost.
# At run time, the host-side runner publishes the same port to the host network as needed.
#
# Recommendation: Use the built-in E2E encryption endpoints (/v1/encryption/encrypt,
# /v1/encryption/decrypt) for tee-pubkey-based client-to-enclave encrypted transport.
ingress:
  - listen_port: 18001       # aux API (for attestation)
  - listen_port: 8080        # [ODYN + SLEEVE] Required. TCP port (u16) inside the enclave.
                             # ODYN: binds EnclaveProxy on this port inside enclave.
                             # SLEEVE: binds HostProxy on host to forward to enclave vsock.

  # Example (NOT for production): expose internal API, and Helios RPC externally.
  # WARNING: Do not expose these endpoints in production environments.
  # Production note: do NOT expose internal API or Helios RPC via ingress.
  # - listen_port: 18000       # internal API (full capabilities)
  # - listen_port: 18545       # Helios RPC chain port

# Egress: enable a local HTTP(S) proxy inside the enclave with allow/deny policy
# When enabled, odyn sets http_proxy/https_proxy env vars to http://127.0.0.1:<proxy_port>
# and `no_proxy=localhost,127.0.0.1` for the entrypoint process.
egress:
  proxy_port: 10000          # [ODYN] Optional. TCP port (u16) for local egress proxy (default: 10000).
                             # ODYN: binds EnclaveHttpProxy on this port, sets http_proxy env var.
  # Allow and deny take a list of patterns. A request host is allowed iff it matches at least
  # one allow pattern AND does not match any deny pattern. If `allow` is empty/missing, egress is disabled.
  allow:
    # Domain patterns (case-insensitive):
    # - Multi-label suffix: "**.amazonaws.com" (matches s3.amazonaws.com and a.b.c.amazonaws.com)
    # NOTE: Domain patterns (including wildcards) DO NOT match IP addresses.
    # Use CIDR notation for IP filtering.
    # IP/CIDR patterns:
    # - Exact IP: "66.254.33.22" (implicit /32)
    # - IPv4 CIDR: "66.254.33.0/24"
    # - IPv6 CIDR: "::/0" (all IPv6)
    - "news.ycombinator.com" # [ODYN] Domain/IP patterns for egress allow list.
    #- "**"                   # Allow all domains (does not match IP addresses)
    #- "0.0.0.0/0"           # Allow all IPv4 traffic
    #- "::/0"                # Allow all IPv6 traffic
    #- "169.254.169.254"      # IMDS (needed for AWS SDK region/credentials discovery)
  deny:
    # Optional block list evaluated after allow. Same grammar as allow.
    #- "*.example.net"        # [ODYN] Domain/IP patterns for egress deny list.
    #- "10.0.0.0/8"

# Optional: Nova KMS integration used by Internal API `/v1/kms/*` and `/v1/app-wallet/*`
# - Enables `/v1/kms/*` and `/v1/app-wallet/*` routes on the Internal API.
# - `/v1/kms/*` calls use registry-backed authz and discovery.
# - Registry mode is enabled only when both `kms_app_id` and `nova_app_registry` are set.
# - If registry mode is enabled, `helios_rpc.enabled=true` and `helios_rpc.chains` must
#   include an entry with `local_rpc_port: 18545`.
# - Registry RPC uses built-in Helios endpoint (`http://127.0.0.1:18545`).
# - `use_app_wallet=true` enables app-wallet material stored in KMS KV.
# - App-wallet local mode (`enabled=true`, `use_app_wallet=true`) can run without registry fields.
# - Instances that resolve to the same KMS app namespace will share the same app-wallet material.
# - App-wallet routes are local-use only.
# - Timeout/retry/discovery settings are ODYN internal defaults (not YAML-configurable).
# - Any extra fields under `kms_integration` are rejected.
# - If `storage.s3.encryption.mode=kms`, this integration must also be enabled.
kms_integration:
  enabled: true              # [ODYN] Enable Nova KMS integration for Internal API KMS/app-wallet routes.
  use_app_wallet: true       # [ODYN] Optional. Enable app-wallet APIs backed by KMS KV (default: false).
  kms_app_id: 49             # [ODYN] Optional example only. Replace with your real Nova app ID for registry-backed `/v1/kms/*`.
  nova_app_registry: "0x0f68E6e699f2E972998a1EcC000c7ce103E64cc8" # [ODYN] Optional. Required for registry-backed `/v1/kms/*`.

# Optional: internal API exposed inside the enclave for attestation/encryption/signing
api:
  listen_port: 18000         # [ODYN] Required. TCP port (u16) for internal API server.
                             # ODYN: binds ApiService providing /v1/attestation, /v1/eth/*, etc.

# Optional: auxiliary API port override for restricted external access (e.g., sidecars)
# Current implementation detail: if `api` is configured, Aux API also starts by default.
# If not specified, it defaults to api.listen_port + 1 when that value fits in `u16`.
# There is no separate Aux API enabled/disabled flag today.
aux_api:
  listen_port: 18001         # [ODYN] Optional. TCP port (u16) for auxiliary API server.
                             # ODYN: binds AuxApiService with sanitized attestation endpoint.

# Optional: Helios Ethereum/OP Stack light client RPC (trustless JSON-RPC)
helios_rpc:
  enabled: true              # [ODYN] Enable/disable Helios services.
  chains:                    # [ODYN] Required when enabled. One entry per local Helios endpoint.
    - name: "L2-base-sepolia"  # [ODYN] Display/logging name for this chain config.
      network_id: "84532"       # [ODYN] Optional chain id for UI/reference.
      kind: "opstack"           # [ODYN] ethereum | opstack
      network: "base-sepolia"   # [ODYN] Network slug for the selected kind.
      execution_rpc: "https://sepolia.base.org" # [ODYN] Required execution RPC URL.
      local_rpc_port: 18545     # [ODYN] Required local JSON-RPC port inside enclave.
      #consensus_rpc: "https://..." # [ODYN] Optional consensus RPC override.
      #checkpoint: "0x..."          # [ODYN] Optional checkpoint (ethereum only).
    - name: "ethereum-mainnet"
      network_id: "1"
      kind: "ethereum"
      network: "mainnet"
      execution_rpc: "https://eth.llamarpc.com"
      local_rpc_port: 18546

# Optional: S3 storage configuration for persistent data
storage:
  s3:
    enabled: true            # [ODYN] Whether to enable S3 storage integration.
    bucket: "my-app-data"    # [ODYN] S3 bucket name for storage.
    prefix: "apps/my-service/" # [ODYN] Key prefix for isolation. If it doesn't end with '/', it will be added.
    region: "us-east-1"      # [ODYN] Optional. AWS region override for the bucket.
                             # If omitted, the region is resolved via IMDS.
                             # Requires egress allow for IMDS (169.254.169.254) and the S3 endpoint.
    encryption:              # [ODYN] Optional. Transparent encryption for stored values.
      mode: "kms"            # [ODYN] plaintext | kms
      key_scope: "object"    # [ODYN] app | object
      aad_mode: "key"        # [ODYN] none | key | key+version
      key_version: "v1"      # [ODYN] Version label included in metadata/derivation path.
      accept_plaintext: true # [ODYN] Allow reading plaintext objects when present.
                             # Note: mode=kms requires kms_integration.enabled=true.

  # Host-backed directory mounts using a dedicated loopback image per mount.
  # Reusing the same host state directory preserves contents across runs; deleting
  # it resets the mount to an empty filesystem.
  # Runtime behavior:
  # - `enclaver run --mount <name>=<host_state_dir>` creates or reuses a fixed-size
  #   loopback image under that host state directory.
  # - The mounted filesystem is bind-mounted into the Sleeve container.
  # - `enclaver-run` serves it over a hostfs file proxy on vsock.
  # - `odyn` mounts it inside the enclave before the application starts.
  mounts:
    - name: "appdata"        # [BUILD] Stable runtime mount identifier.
      mount_path: "/mnt/appdata" # [ODYN] Path mounted inside the enclave before app launch.
      required: true         # [BUILD] Fail runtime binding resolution when omitted.
      size_mb: 10240         # [BUILD] Loopback image size in MiB. Runtime always creates the host state dir if missing and mounts rw.

# Optional: automatic clock synchronization between host and enclave
# Nitro Enclaves do not automatically synchronize their system clock with the host.
# Over time, the enclave clock drifts (~7 seconds per week). This can cause failures
# in JWT validation, TLS certificate checks, and cryptographic protocols.
# Enclaver enables clock sync by default, even if this block is omitted.
# Use this block only to disable clock sync or adjust the sync interval.
# Omit the block entirely to keep defaults, or write `clock_sync: {}` to keep
# defaults while documenting the setting explicitly.
clock_sync:
  # enabled: false           # [ODYN + SLEEVE] Optional. Set to false to disable automatic clock synchronization.
  interval_secs: 300         # [ODYN] Optional. Sync interval in seconds (default: 300).
                             # ODYN: connects to host time server via vsock, estimates RTT/offset,
                             # and sets system clock.
                             # SLEEVE: starts a vsock time server on the host side.

# ============================================================================
# Summary: Parameter -> Module Mapping
# ============================================================================
#
# | Parameter              | Module      | Description                                    |
# |------------------------|-------------|------------------------------------------------|
# | version                | BUILD       | Manifest schema version                        |
# | name                   | BUILD       | Application name for tagging                   |
# | target                 | BUILD       | Output release image tag                       |
# | sources.app            | BUILD       | User application Docker image                  |
# | sources.odyn           | BUILD       | Odyn supervisor image (binary extraction)      |
# | sources.sleeve         | BUILD       | Sleeve base image for release packaging        |
# | signature.certificate  | BUILD       | EIF signing certificate path                   |
# | signature.key          | BUILD       | EIF signing private key path                   |
# | defaults.cpu_count     | SLEEVE      | Enclave vCPU allocation                        |
# | defaults.memory_mb     | SLEEVE      | Enclave memory allocation                      |
# | ingress[].listen_port  | ODYN+SLEEVE | Ingress port (both sides bind proxies)         |
# | egress.proxy_port      | ODYN        | Local HTTP proxy port inside enclave           |
# | egress.allow           | ODYN        | Egress allow list (domain/IP patterns)         |
# | egress.deny            | ODYN        | Egress deny list (domain/IP patterns)          |
# | kms_integration.enabled | ODYN       | Enable Nova KMS integration                    |
# | kms_integration.use_app_wallet | ODYN | Enable app-wallet APIs backed by KMS KV (default: false) |
# | kms_integration.kms_app_id | ODYN    | Optional. Nova app ID for registry-backed `/v1/kms/*` |
# | kms_integration.nova_app_registry | ODYN | Optional. Registry contract for `/v1/kms/*` |
# | api.listen_port        | ODYN        | Internal API port (attestation, signing, etc.) |
# | aux_api.listen_port    | ODYN        | Auxiliary API port (restricted access)         |
# | helios_rpc.enabled     | ODYN        | Enable/disable Helios RPC service              |
# | helios_rpc.chains[].name | ODYN      | Chain config name used in logs/UI              |
# | helios_rpc.chains[].network_id | ODYN | Optional chain id for reference               |
# | helios_rpc.chains[].kind | ODYN      | Helios client type (ethereum or opstack)       |
# | helios_rpc.chains[].network | ODYN   | Network selection for the selected kind        |
# | helios_rpc.chains[].execution_rpc | ODYN | Execution RPC URL (required)              |
# | helios_rpc.chains[].local_rpc_port | ODYN | Local JSON-RPC port per chain             |
# | helios_rpc.chains[].consensus_rpc | ODYN | Optional consensus RPC override           |
# | helios_rpc.chains[].checkpoint | ODYN | Optional checkpoint override (ethereum)      |
# | storage.s3.enabled     | ODYN        | Enable/disable S3 storage integration          |
# | storage.s3.bucket      | ODYN        | S3 bucket for persistent storage               |
# | storage.s3.prefix      | ODYN        | Prefix for S3 key isolation                    |
# | storage.s3.region      | ODYN        | Regional override for S3 bucket                |
# | storage.s3.encryption.mode | ODYN    | Storage encryption mode (plaintext or kms)     |
# | storage.s3.encryption.key_scope | ODYN | Derivation scope (app/object)               |
# | storage.s3.encryption.aad_mode | ODYN | AAD binding mode for ciphertext metadata     |
# | storage.s3.encryption.key_version | ODYN | Encryption key version label              |
# | storage.s3.encryption.accept_plaintext | ODYN | Allow plaintext reads when present      |
# | clock_sync.enabled     | ODYN+SLEEVE | Disable clock sync when set to false (default: enabled) |
# | clock_sync.interval_secs | ODYN      | Override clock sync interval in seconds (default 300) |
#
# ============================================================================
