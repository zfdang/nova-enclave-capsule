# Summary: Parameter -> Module Mapping
# ============================================================================
#
# | Parameter                             | BUILD | CLI | CAPSULE_SHELL | CAPSULE_RUNTIME | Description                                          |
# |---------------------------------------|:-----:|:---:|:-------------:|:---------------:|------------------------------------------------------|
# | version                               |   ✓   |     |               |                 | Manifest schema version                              |
# | name                                  |   ✓   |     |               |                 | Application name for tagging                         |
# | target                                |   ✓   |     |               |                 | Output release image tag                             |
# | sources.app                           |   ✓   |     |               |                 | User application Docker image                        |
# | sources.capsule-runtime               |   ✓   |     |               |                 | Capsule Runtime supervisor image (binary extraction) |
# | sources.capsule-shell                 |   ✓   |     |               |                 | Capsule Shell base image for release packaging       |
# | signature.certificate                 |   ✓   |     |               |                 | EIF signing certificate path                         |
# | signature.key                         |   ✓   |     |               |                 | EIF signing private key path                         |
# | defaults.cpu_count                    |       |     |       ✓       |                 | Enclave vCPU allocation                              |
# | defaults.memory_mb                    |       |     |       ✓       |                 | Enclave memory allocation                            |
# | ingress[].listen_port                 |       |     |       ✓       |        ✓        | Ingress port (both sides bind proxies)               |
# | egress.proxy_port                     |       |     |               |        ✓        | Local HTTP proxy port inside enclave                 |
# | egress.allow                          |       |     |               |        ✓        | Egress allow list (domain/IP patterns)               |
# | egress.deny                           |       |     |               |        ✓        | Egress deny list (domain/IP patterns)                |
# | kms_integration.enabled               |       |     |               |        ✓        | Enable Nova KMS integration                          |
# | kms_integration.use_app_wallet        |       |     |               |        ✓        | Enable app-wallet APIs backed by KMS KV              |
# | kms_integration.kms_app_id            |       |     |               |        ✓        | Nova app ID for registry-backed `/v1/kms/*`          |
# | kms_integration.nova_app_registry     |       |     |               |        ✓        | Registry contract for `/v1/kms/*`                    |
# | api.listen_port                       |       |     |               |        ✓        | Capsule API port (attestation, signing, etc.)        |
# | aux_api.listen_port                   |       |     |               |        ✓        | Auxiliary API port (restricted access)               |
# | helios_rpc.enabled                    |       |     |               |        ✓        | Enable/disable Helios RPC service                    |
# | helios_rpc.chains[].name              |       |     |               |        ✓        | Chain config name used in logs/UI                    |
# | helios_rpc.chains[].network_id        |       |     |               |        ✓        | Optional chain id for reference                      |
# | helios_rpc.chains[].kind              |       |     |               |        ✓        | Helios client type (ethereum or opstack)             |
# | helios_rpc.chains[].network           |       |     |               |        ✓        | Network selection for the selected kind              |
# | helios_rpc.chains[].execution_rpc     |       |     |               |        ✓        | Execution RPC URL (required)                         |
# | helios_rpc.chains[].local_rpc_port    |       |     |               |        ✓        | Local JSON-RPC port per chain                        |
# | helios_rpc.chains[].consensus_rpc     |       |     |               |        ✓        | Optional consensus RPC override                      |
# | helios_rpc.chains[].checkpoint        |       |     |               |        ✓        | Optional checkpoint override (ethereum)              |
# | storage.s3.enabled                    |       |     |               |        ✓        | Enable/disable S3 storage integration                |
# | storage.s3.bucket                     |       |     |               |        ✓        | S3 bucket for persistent storage                     |
# | storage.s3.prefix                     |       |     |               |        ✓        | Prefix for S3 key isolation                          |
# | storage.s3.region                     |       |     |               |        ✓        | Regional override for S3 bucket                      |
# | storage.s3.encryption.mode            |       |     |               |        ✓        | Storage encryption mode (plaintext or kms)           |
# | storage.s3.encryption.key_scope       |       |     |               |        ✓        | Derivation scope (app/object)                        |
# | storage.s3.encryption.aad_mode        |       |     |               |        ✓        | AAD binding mode for ciphertext metadata             |
# | storage.s3.encryption.key_version     |       |     |               |        ✓        | Encryption key version label                         |
# | storage.s3.encryption.accept_plaintext|       |     |               |        ✓        | Allow plaintext reads when present                   |
# | storage.mounts[].name                 |   ✓   |  ✓  |               |                 | Stable runtime mount identifier                      |
# | storage.mounts[].mount_path           |       |     |               |        ✓        | Enclave mount path (must live under /mnt)            |
# | storage.mounts[].required             |   ✓   |  ✓  |               |                 | Fail runtime startup when the bind is missing        |
# | storage.mounts[].size_mb              |   ✓   |  ✓  |               |                 | Loopback image size in MiB                           |
