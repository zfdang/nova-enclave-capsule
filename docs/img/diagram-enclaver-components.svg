<svg width="1240" height="736" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Maintainable text-based component diagram.
    Updated to match the current Enclaver runtime model:
    - host-side enclaver-run services
    - enclave-side odyn runtime services
    - Internal API capabilities vs Aux API
    - default-on clock sync
    - optional Helios / Nova KMS integration
  -->
  <defs>
    <marker id="arrowGreen" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#4D8F25"/>
    </marker>
    <marker id="arrowAmber" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#D97706"/>
    </marker>
    <marker id="arrowBlue" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#6B7280"/>
    </marker>
    <marker id="arrowOrange" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#C2410C"/>
    </marker>
    <style>
      .title { font: 700 26px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 14px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #4B5563; }
      .subtitle-strong { font: 700 14px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .section { font: 700 20px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .panel-title { font: 700 16px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .box-title { font: 700 15px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .box-title-light { font: 700 15px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #FFFFFF; }
      .label { font: 600 13px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #1F2937; }
      .label-light { font: 600 13px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #FFFFFF; }
      .small { font: 500 12px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #4B5563; }
      .small-light { font: 500 12px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #E5EDFF; }
      .tiny { font: 500 11px "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif; fill: #6B7280; }
      .mono { font: 600 11px "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; fill: #374151; }
      .mono-light { font: 600 11px "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; fill: #E5EDFF; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#F8FAFC"/>
  <g transform="translate(40,0)">

  <text x="100" y="70" class="title">Enclaver Runtime Components</text>
  <text x="100" y="94" class="subtitle">Host-side <tspan class="subtitle-strong">enclaver-run</tspan> + enclave-side <tspan class="subtitle-strong">odyn</tspan>, with Internal API / Aux API, clock sync,</text>
  <text x="100" y="114" class="subtitle">and optional Helios / Nova KMS integration paths.</text>

  <rect x="100" y="140" width="860" height="520" rx="28" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="2"/>
  <text x="130" y="176" class="section">Cloud VM / bare-metal machine</text>

  <rect x="130" y="200" width="220" height="390" rx="24" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <text x="160" y="228" class="panel-title">Host-side services</text>

  <rect x="30" y="297" width="100" height="72" rx="18" fill="#F0FDF4" stroke="#84CC16" stroke-width="2"/>
  <text x="80" y="327" text-anchor="middle" class="box-title">External</text>
  <text x="80" y="347" text-anchor="middle" class="small">clients</text>

  <rect x="30" y="470" width="100" height="72" rx="18" fill="#F0FDF4" stroke="#84CC16" stroke-width="2"/>
  <text x="80" y="500" text-anchor="middle" class="box-title">Outbound</text>
  <text x="80" y="520" text-anchor="middle" class="small">services</text>

  <rect x="160" y="230" width="160" height="58" rx="16" fill="#5B8DEF"/>
  <text x="240" y="253" text-anchor="middle" class="box-title-light">enclaver run</text>
  <text x="240" y="272" text-anchor="middle" class="small-light"><tspan class="mono-light">enclaver-run</tspan> + <tspan class="mono-light">nitro-cli</tspan></text>

  <rect x="160" y="309" width="160" height="50" rx="16" fill="#E8F6DF" stroke="#84CC16" stroke-width="2"/>
  <text x="240" y="340" text-anchor="middle" class="box-title">Host ingress proxies</text>

  <rect x="160" y="376" width="160" height="50" rx="16" fill="#E8F6DF" stroke="#84CC16" stroke-width="2"/>
  <text x="240" y="407" text-anchor="middle" class="box-title">Host egress proxy</text>

  <rect x="160" y="444" width="160" height="72" rx="16" fill="#FFF1D6" stroke="#F59E0B" stroke-width="2"/>
  <text x="240" y="468" text-anchor="middle" class="box-title">Clock sync server</text>
  <text x="240" y="488" text-anchor="middle" class="small">uses host wall clock</text>
  <text x="240" y="506" text-anchor="middle" class="mono">vsock 17003</text>

  <rect x="160" y="534" width="160" height="50" rx="16" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2"/>
  <text x="240" y="565" text-anchor="middle" class="box-title">Logs + status</text>

  <line x1="370" y1="205" x2="370" y2="610" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="356" y="435" transform="rotate(-90 356 435)" class="tiny">VSOCK boundary</text>

  <rect x="390" y="180" width="540" height="450" rx="24" fill="#21448B" stroke="#173B78" stroke-width="2"/>
  <text x="660" y="212" text-anchor="middle" class="label-light">AWS Nitro Enclave (application.eif)</text>

  <rect x="420" y="220" width="280" height="390" rx="22" fill="#E8F0FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="450" y="250" class="panel-title"><tspan class="mono">/sbin/odyn</tspan> (PID 1)</text>
  <text x="450" y="268" class="tiny">runtime services, Internal API, app supervisor</text>

  <text x="440" y="298" class="label">Runtime services</text>
  <rect x="440" y="316" width="110" height="36" rx="12" fill="#FFFFFF" stroke="#8FB4FF" stroke-width="2"/>
  <text x="495" y="338" text-anchor="middle" class="box-title">Launcher</text>

  <rect x="570" y="316" width="110" height="36" rx="12" fill="#FFFFFF" stroke="#8FB4FF" stroke-width="2"/>
  <text x="625" y="338" text-anchor="middle" class="box-title">Ingress</text>

  <rect x="440" y="362" width="110" height="36" rx="12" fill="#FFFFFF" stroke="#8FB4FF" stroke-width="2"/>
  <text x="495" y="384" text-anchor="middle" class="box-title">Egress</text>

  <rect x="570" y="362" width="110" height="36" rx="12" fill="#FFFFFF" stroke="#8FB4FF" stroke-width="2"/>
  <text x="625" y="384" text-anchor="middle" class="box-title">Clock sync</text>

  <rect x="440" y="408" width="110" height="36" rx="12" fill="#FFFFFF" stroke="#8FB4FF" stroke-width="2"/>
  <text x="495" y="430" text-anchor="middle" class="box-title">Helios RPC</text>

  <rect x="570" y="408" width="110" height="36" rx="12" fill="#FFFFFF" stroke="#8FB4FF" stroke-width="2"/>
  <text x="625" y="430" text-anchor="middle" class="box-title">Console</text>

  <rect x="438" y="460" width="244" height="108" rx="18" fill="#FFFFFF" stroke="#60A5FA" stroke-width="2"/>
  <text x="458" y="484" class="label">Internal API (<tspan class="mono">/v1/*</tspan>)</text>
  <text x="458" y="502" class="tiny">attestation, signing, random, encryption, storage, kms</text>
  <rect x="450" y="512" width="100" height="24" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="500" y="528" text-anchor="middle" class="tiny">core</text>
  <rect x="560" y="512" width="110" height="24" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="615" y="528" text-anchor="middle" class="tiny">encryption</text>
  <rect x="450" y="540" width="100" height="24" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="500" y="556" text-anchor="middle" class="tiny">storage</text>
  <rect x="560" y="540" width="110" height="24" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="615" y="556" text-anchor="middle" class="tiny">kms + wallet</text>

  <rect x="438" y="576" width="244" height="28" rx="14" fill="#ECFEFF" stroke="#22D3EE" stroke-width="2"/>
  <text x="458" y="595" class="label">Aux API</text>
  <text x="530" y="595" class="tiny">restricted proxy; starts when API is enabled</text>

  <rect x="720" y="286" width="185" height="224" rx="22" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="812" y="316" text-anchor="middle" class="panel-title">User Application</text>
  <text x="745" y="345" class="small">- started by launcher</text>
  <text x="745" y="368" class="small">- binds localhost ports</text>
  <text x="745" y="391" class="small">- calls <tspan class="mono">/v1/*</tspan></text>
  <text x="745" y="414" class="small">- can use Helios local RPC</text>
  <text x="745" y="437" class="small">- stdout/stderr via console</text>

  <rect x="990" y="80" width="240" height="92" rx="20" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="1110" y="109" text-anchor="middle" class="box-title">Ethereum / OP Stack</text>
  <text x="1110" y="129" text-anchor="middle" class="small">Helios syncs against upstream RPCs</text>
  <text x="1110" y="147" text-anchor="middle" class="tiny">local trustless RPC stays inside the enclave</text>

  <rect x="990" y="235" width="240" height="118" rx="20" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="1110" y="264" text-anchor="middle" class="box-title">Nova KMS cluster</text>
  <text x="1110" y="284" text-anchor="middle" class="small">used by <tspan class="mono">/v1/kms/*</tspan> and</text>
  <text x="1110" y="302" text-anchor="middle" class="small"><tspan class="mono">/v1/app-wallet/*</tspan></text>
  <text x="1110" y="325" text-anchor="middle" class="tiny">registry-backed mode may wait for</text>
  <text x="1110" y="341" text-anchor="middle" class="mono">Helios :18545</text>

  <rect x="390" y="636" width="510" height="28" rx="14" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="645" y="655" text-anchor="middle" class="tiny">shared <tspan class="mono">enclaver.yaml</tspan> drives host proxies, odyn services, and app launch</text>

  <path d="M130 333H160" stroke="#4D8F25" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M320 334H370V300H625V316" stroke="#4D8F25" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M680 334H720" stroke="#4D8F25" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <path d="M720 458H700V380H550" stroke="#4D8F25" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M440 380H390V401H320" stroke="#4D8F25" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M160 401H145V506H134" stroke="#4D8F25" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <path d="M320 480H370V416H625V398" stroke="#D97706" stroke-width="3.5" marker-start="url(#arrowAmber)" marker-end="url(#arrowAmber)"/>

  <path d="M682 514H720" stroke="#2563EB" stroke-width="3.5" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>

  <path d="M555 576V568" stroke="#0891B2" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <path d="M550 408H700V250C780 190 860 150 990 126" stroke="#C2410C" stroke-width="3.5" stroke-dasharray="8 6" marker-end="url(#arrowOrange)"/>

  <path d="M670 552H690C780 620 900 620 990 290" stroke="#C2410C" stroke-width="3.5" stroke-dasharray="8 6" marker-end="url(#arrowOrange)"/>

  <path d="M680 426H700V618H340V559H320" stroke="#6B7280" stroke-width="3" marker-end="url(#arrowGray)"/>
  </g>
</svg>
